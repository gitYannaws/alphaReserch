<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sources</title>
<style>
  :root{--bg:#101114;--panel:#17191f;--line:#2a2e38;--fg:#e8eaee;--mut:#8f98a8;--acc:#f2734e;--ok:#4fb06d;--err:#f05d5e}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 system-ui,Segoe UI,sans-serif}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px}
  h1{font-size:18px;margin:0}
  .sub{color:var(--mut);font-size:13px}
  .nav{margin-left:auto;display:flex;gap:14px;font-size:13px}
  main{max-width:1120px;margin:0 auto;padding:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin-bottom:8px}
  .row{display:flex;gap:12px;align-items:end;flex-wrap:wrap}
  input,select{background:#0c0d11;border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:10px 12px;font-size:14px}
  /* a <select> sizes to its longest option (model names run ~338px) and would otherwise
     blow out its container; clamp it and let wide tables scroll instead of bleeding out */
  input,select{max-width:100%}
  .table-wrap{overflow-x:auto}
  input[type=text],input:not([type]){width:100%;max-width:320px}
  button{background:var(--acc);color:#1a0e08;border:0;border-radius:6px;padding:10px 16px;font-weight:700;cursor:pointer}
  button:disabled{opacity:.45;cursor:not-allowed}
  button.secondary{background:transparent;border:1px solid var(--line);color:var(--fg);font-weight:400}
  button.warn{background:var(--err);color:#1a0e08}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .dim{color:var(--mut)}
  .err{color:var(--err);margin-top:8px}
  a{color:var(--acc);text-decoration:none}
  .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mut)}
  .toggle input{width:auto}
  .badge{display:inline-block;padding:2px 9px;border-radius:16px;font-size:12px;border:1px solid var(--acc);color:var(--acc)}
  .badge.done,.badge.ok{color:var(--ok);border-color:var(--ok)}
  .badge.warn{color:#e0a030;border-color:#e0a030}
  .badge.err{color:var(--err);border-color:var(--err)}
  .badge.dim{color:var(--mut);border-color:var(--line)}
  .kickbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .progbar{background:#0c0d11;border:1px solid var(--line);border-radius:5px;height:8px;overflow:hidden;flex:1;min-width:160px}
  .progfill{background:var(--acc);height:100%;transition:width .3s}
  .tag{display:inline-block;padding:1px 8px;border-radius:12px;font-size:11px;border:1px solid var(--line);color:var(--mut);text-transform:lowercase}
  .stageList{display:grid;gap:8px;margin-top:12px}
  .stageItem{border:1px solid var(--line);border-radius:8px;background:#111319;padding:10px}
  .stageTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .stageSource{font-weight:700;overflow-wrap:anywhere}
  .stageMeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:3px}
  .stageProgress{display:flex;gap:10px;align-items:center;margin-top:8px}
  .stageProgress .progbar{min-width:120px}
  .pct{font-variant-numeric:tabular-nums;color:var(--fg);font-weight:700;min-width:42px;text-align:right}
  .mini{font-size:11px}
  code{font-size:12px}
</style>
</head>
<body>
<header>
  <h1>Sources</h1>
  <span class="sub">forums / subreddits you collect and analyze over time</span>
  <nav class="nav"><a href="/">Main App</a></nav>
</header>
<main>
  <div class="card">
    <div class="row">
      <div>
        <label>Subreddit / blog URL</label>
        <input id="addUrl" placeholder="https://www.reddit.com/r/subreddit/top/">
      </div>
      <div>
        <label>Label (optional)</label>
        <input id="addLabel" placeholder="subreddit">
      </div>
      <button id="addBtn">Add source</button>
    </div>
    <div id="addErr" class="err"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <label style="margin:0">Tracked sources <span class="dim" id="selCount"></span></label>
      <div class="row" style="gap:16px">
        <div style="width:150px">
          <label style="margin-bottom:4px">Extractor</label>
          <select id="koExtractor">
            <option value="qwen" selected>Qwen 2.5 14B (local)</option>
            <option value="qwen3">Qwen3 14B (local)</option>
            <option value="claude_sonnet">Claude Sonnet 4.6 (claude-sonnet-4-6)</option>
            <option value="claude_haiku">Claude Haiku 4.5 (claude-haiku-4-5-20251001)</option>
            <option value="codex">ChatGPT/Codex 5.6 Terra (gpt-5.6-terra)</option>
            <option value="codex_gpt56_sol">ChatGPT/Codex 5.6 Sol (gpt-5.6-sol)</option>
            <option value="codex_gpt56_luna">ChatGPT/Codex 5.6 Luna (gpt-5.6-luna)</option>
            <option value="codex_gpt55">ChatGPT/Codex 5.5 (gpt-5.5)</option>
            <option value="codex_gpt54">ChatGPT/Codex 5.4 (gpt-5.4)</option>
            <option value="codex_gpt54_mini">ChatGPT/Codex 5.4 Mini (gpt-5.4-mini)</option>
            <option value="codex_spark">ChatGPT/Codex Spark (gpt-5.3-codex-spark)</option>
            <option value="glm">GLM (local)</option>
          </select>
        </div>
        <button id="analyzeBtn" disabled title="Pick 1-15 collected sources to enable">Analyze (3&rarr;15)</button>
        <button id="mergeAnalyzeBtn" class="secondary" disabled title="Pick 2-15 collected sources to merge into one run">Merge + Analyze</button>
      </div>
    </div>
    <div class="dim" style="margin-top:8px;font-size:12px">
      <b>Analyze</b> runs each source separately. <b>Merge + Analyze</b> combines selected corpora into one run and one report.
    </div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:28px"><input type="checkbox" id="selAll"></th>
          <th>Platform</th>
          <th>Source</th>
          <th>Label</th>
          <th>Posts</th>
          <th>Threads</th>
          <th>Authors</th>
          <th>Size</th>
          <th>Latest post</th>
          <th>Last collected</th>
          <th>Freshness</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    </div>
  </div>

  <div class="card" id="kickoffCard" style="display:none">
    <div class="kickbar">
      <label style="margin:0">Kickoff progress</label>
      <span class="badge" id="koBadge">running</span>
      <div class="progbar"><div class="progfill" id="koFill" style="width:0%"></div></div>
      <span class="dim" id="koCount"></span>
      <button id="koStop" class="secondary warn">Stop</button>
    </div>
    <div class="dim" id="koCurrent" style="margin-top:8px"></div>
    <div id="koJobs" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"></div>
    <div id="koItems" class="stageList"></div>
  </div>

  <div class="card" id="activeCard" style="display:none">
    <div class="kickbar">
      <label style="margin:0">Active runs</label>
      <span class="badge" id="activeBadge">checking</span>
    </div>
    <div id="activeItems" class="stageList"></div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function fmtWhen(s){
  if(!s) return "-";
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleString();
}
function fmtBytes(n){
  const bytes = Number(n || 0);
  if(bytes <= 0) return "0 B";
  const gb = 1024 ** 3, mb = 1024 ** 2, kb = 1024;
  if(bytes >= gb) return `${(bytes / gb).toFixed(2)} GB`;
  if(bytes >= mb) return `${(bytes / mb).toFixed(1)} MB`;
  if(bytes >= kb) return `${(bytes / kb).toFixed(1)} KB`;
  return `${bytes} B`;
}
function splitKey(key){
  const s = String(key || "");
  const i = s.indexOf(":");
  return i < 0 ? {platform: "-", name: s} : {platform: s.slice(0, i), name: s.slice(i + 1)};
}
const KICKOFF_MAX = 15;
let SOURCES = [];
let koPoll = null;
let activePoll = null;
let mergeReady = false;
let EXTRACTOR_OPTIONS = {};
const STAGE_NAME = {
  1: "Collect",
  2: "Store",
  3: "Extract",
  4: "Embed",
  5: "Cluster",
  6: "Score",
  7: "Filter",
  8: "Competition",
  9: "Rank",
  10: "Ideas",
  11: "Validate",
  12: "Report",
};
const DONE_STATUSES = new Set(["done", "reported"]);
const BAD_STATUSES = new Set(["error", "cancelled", "interrupted", "stopped"]);

function extractorLabelFromValue(value){
  return EXTRACTOR_OPTIONS[value]?.label || value || "";
}
function extractorModelText(run){
  if(run?.extract_model){
    if(run.extract_provider === "claude") return `Claude CLI --model ${run.extract_model}`;
    return run.extract_model;
  }
  return extractorLabelFromValue(run?.extractor || run?.extract_provider);
}
async function loadExtractorOptions(){
  try{
    const data = await (await fetch("/api/extractors")).json();
    EXTRACTOR_OPTIONS = {};
    (data.items || []).forEach(item => { EXTRACTOR_OPTIONS[item.value] = item; });
    const sel = $("koExtractor"), cur = sel.value;
    [...sel.options].forEach(opt => {
      const label = extractorLabelFromValue(opt.value);
      if(label) opt.textContent = label;
    });
    sel.value = cur;
  }catch(e){}
}

async function loadSources(){
  SOURCES = await (await fetch("/api/sources")).json();
  renderRows();
}
function selectedIds(){
  return Array.from(document.querySelectorAll(".srcChk:checked")).map(c => c.dataset.id);
}
function updateSelCount(){
  const n = selectedIds().length;
  $("selCount").textContent = n ? `(${n} selected)` : "";
  const canAnalyze = n >= 1 && n <= KICKOFF_MAX;
  $("analyzeBtn").disabled = !canAnalyze;
  $("analyzeBtn").title = canAnalyze
    ? `Analyze ${n} collected corpora (stages 3-15)`
    : `Pick 1-${KICKOFF_MAX} sources to analyze (currently ${n})`;
  const canMerge = mergeReady && n >= 2 && n <= KICKOFF_MAX;
  $("mergeAnalyzeBtn").disabled = !canMerge;
  $("mergeAnalyzeBtn").title = canMerge
    ? `Merge ${n} corpora into one analysis run`
    : mergeReady
      ? `Pick 2-${KICKOFF_MAX} sources to merge (currently ${n})`
      : "Merge analyze will be available after the server reloads";
}
const FRESHNESS = {
  no_data:     {label: "No data",     cls: "dim"},
  backfilling: {label: "Backfilling", cls: "warn"},
  growing:     {label: "Growing",     cls: "warn"},
  up_to_date:  {label: "Up to date",  cls: "ok"},
  stale:       {label: "Stale",       cls: "err"},
};
function freshnessBadge(s){
  const f = FRESHNESS[s.freshness] || FRESHNESS.no_data;
  let detail = "";
  if(s.freshness === "up_to_date" || s.freshness === "stale" || s.freshness === "growing"){
    const n = s.last_run_new_docs;
    const d = s.days_since_last_run;
    const parts = [];
    if(n != null) parts.push(`+${n} last run`);
    if(d != null) parts.push(d < 1 ? "today" : `${Math.round(d)}d ago`);
    detail = parts.length ? ` <span class="dim" style="font-size:11px">(${parts.join(", ")})</span>` : "";
  }
  return `<span class="badge ${f.cls}">${f.label}</span>${detail}`;
}
function renderRows(){
  $("rows").innerHTML = SOURCES.length ? SOURCES.map(s => {
    const k = splitKey(s.corpus_key);
    return `
    <tr>
      <td><input type="checkbox" class="srcChk" data-id="${esc(s.id)}"></td>
      <td><span class="tag">${esc(k.platform)}</span></td>
      <td><code title="${esc(s.url)}">${esc(k.name)}</code></td>
      <td>${esc(s.label || "-")}</td>
      <td>${esc(s.doc_count || 0)}</td>
      <td>${esc(s.thread_count || 0)}</td>
      <td>${esc(s.author_count || 0)}</td>
      <td class="dim">${esc(fmtBytes(s.total_bytes))}</td>
      <td class="dim">${esc(fmtWhen(s.latest_post_at))}</td>
      <td class="dim">${esc(fmtWhen(s.last_fetched_at))}</td>
      <td>${freshnessBadge(s)}</td>
      <td><button class="secondary" data-del="${esc(s.id)}">Remove</button></td>
    </tr>`;
  }).join("")
    : `<tr><td colspan="12" class="dim">no sources tracked yet — add one above</td></tr>`;
  document.querySelectorAll(".srcChk").forEach(c => c.addEventListener("change", updateSelCount));
  document.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", async () => {
    await fetch(`/api/sources/${b.dataset.del}`, {method:"DELETE"});
    loadSources();
  }));
  updateSelCount();
}

function statusClass(status){
  if(DONE_STATUSES.has(status)) return " done";
  if(BAD_STATUSES.has(status)) return " err";
  if(status === "queued" || status === "recovering") return " warn";
  return "";
}
function runPct(run, itemStatus){
  if(run && run.progress && run.progress.pct != null) return Math.max(0, Math.min(100, Number(run.progress.pct) || 0));
  const status = run?.status || itemStatus;
  return DONE_STATUSES.has(status) ? 100 : 0;
}
function progressText(run, itemStatus){
  const p = run?.progress;
  if(p && p.total > 0) return `${p.done}/${p.total} ${p.unit || "items"} - ${runPct(run, itemStatus)}%`;
  if(p && p.total === 0 && p.unit) return p.unit;
  const status = run?.status || itemStatus || "queued";
  return DONE_STATUSES.has(status) ? "complete" : status;
}
function sourceName(seed, corpusKey, label){
  if(label) return label;
  const key = splitKey(corpusKey || "");
  if(key.name) return key.name;
  try {
    const u = new URL(seed);
    return u.pathname.replace(/^\/|\/$/g, "") || u.hostname;
  } catch {
    return seed || "-";
  }
}
function renderStageItem(item, run){
  const status = run?.status || item.status || "queued";
  const pct = runPct(run, item.status);
  const stage = run?.stage || item.stage;
  const stageLabel = stage ? `Stage ${stage} - ${STAGE_NAME[stage] || status}` : "Queued";
  const name = sourceName(item.seed || run?.seed, item.corpus_key, item.label);
  const job = run?.job_id || item.job_id;
  const err = run?.error || item.error;
  const counts = run ? [
    run.pains != null ? `${run.pains} pains` : "",
    run.clusters != null ? `${run.clusters} themes` : "",
    run.ideas != null ? `${run.ideas} ideas` : "",
  ].filter(Boolean).join(" / ") : "";
  const extractor = extractorModelText(run);
  return `
    <div class="stageItem">
      <div class="stageTop">
        <div>
          <div class="stageSource">${esc(name)}</div>
          <div class="stageMeta">
            <span class="badge mini${statusClass(status)}">${esc(status)}</span>
            <span class="dim">${esc(stageLabel)}</span>
            ${job ? `<a class="mini" href="/?job=${esc(job)}" target="_blank">${esc(job)}</a>` : ""}
          </div>
        </div>
        <div class="pct">${pct}%</div>
      </div>
      <div class="stageProgress">
        <div class="progbar"><div class="progfill" style="width:${pct}%"></div></div>
        <span class="dim mini">${esc(progressText(run, item.status))}</span>
      </div>
      ${extractor ? `<div class="dim mini" style="margin-top:6px">Extractor: ${esc(extractor)}</div>` : ""}
      ${counts ? `<div class="dim mini" style="margin-top:6px">${esc(counts)}</div>` : ""}
      ${err ? `<div class="err mini">${esc(err)}</div>` : ""}
    </div>`;
}
function renderStageList(el, items){
  el.innerHTML = items.length
    ? items.map(item => renderStageItem(item, item.run || item)).join("")
    : `<div class="dim">No active analysis runs.</div>`;
}

$("selAll").addEventListener("change", e => {
  document.querySelectorAll(".srcChk").forEach(c => c.checked = e.target.checked);
  updateSelCount();
});

$("addBtn").addEventListener("click", async () => {
  const url = $("addUrl").value.trim();
  $("addErr").textContent = "";
  if(!url){ $("addErr").textContent = "url required"; return; }
  const r = await fetch("/api/sources", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({url, label: $("addLabel").value.trim() || null})});
  const data = await r.json();
  if(!r.ok){ $("addErr").textContent = data.error || "failed to add"; return; }
  $("addUrl").value = ""; $("addLabel").value = "";
  loadSources();
});

async function startKickoff(mode){
  const source_ids = selectedIds();
  const r = await fetch("/api/sources/kickoff", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      source_ids,
      mode,
      use_corpus: true,
      extractor: $("koExtractor").value,
    })});
  const data = await r.json();
  if(!r.ok){ alert(data.error || "kickoff failed"); return; }
  $("kickoffCard").style.display = "block";
  pollKickoff(data.kickoff_id);
}
$("analyzeBtn").addEventListener("click", () => startKickoff("analyze"));

async function startMergeAnalyze(){
  const source_ids = selectedIds();
  const selected = SOURCES.filter(s => source_ids.includes(s.id));
  const label = "merged:" + selected.map(s => s.corpus_key || splitKey(s.url).name).join("+");
  const r = await fetch("/api/sources/merge-analyze", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      source_ids,
      extractor: $("koExtractor").value,
      label,
    })});
  const data = await r.json();
  if(!r.ok){ alert(data.error || "merge analyze failed"); return; }
  $("activeCard").style.display = "block";
  pollActive();
}
$("mergeAnalyzeBtn").addEventListener("click", startMergeAnalyze);

$("koStop").addEventListener("click", async () => {
  const id = $("kickoffCard").dataset.kickoffId;
  if(id) await fetch(`/api/sources/kickoff/${id}/stop`, {method:"POST"});
});

function pollKickoff(id){
  $("kickoffCard").dataset.kickoffId = id;
  if(koPoll) clearInterval(koPoll);
  const tick = async () => {
    const r = await fetch(`/api/sources/kickoff/${id}`);
    if(!r.ok) return;
    const k = await r.json();
    const pct = k.total ? Math.round((k.done / k.total) * 100) : 0;
    $("koFill").style.width = pct + "%";
    $("koCount").textContent = `${k.done}/${k.total}`;
    $("koBadge").className = "badge" + (k.status === "done" ? " done" : "");
    $("koBadge").textContent = (k.mode || "collect") + " · " + k.status;
    $("koCurrent").textContent = k.current_source
      ? `now ${k.mode === "analyze" ? "analyzing" : "collecting"}: ${k.current_source} (job ${k.current_job_id})` : "";
    $("koJobs").innerHTML = k.job_ids.map(j =>
      `<a href="/?job=${j}" target="_blank">${j}</a>`).join("");
    renderStageList($("koItems"), k.items || []);
    if(k.status !== "running"){
      clearInterval(koPoll);
      loadSources();
    }
  };
  tick();
  koPoll = setInterval(tick, 2000);
}

async function pollActive(){
  const tick = async () => {
    const r = await fetch("/api/active-runs");
    if(!r.ok) return;
    const data = await r.json();
    const items = (data.items || []).map(run => ({run, status: run.status, seed: run.seed}));
    $("activeCard").style.display = items.length ? "block" : "none";
    $("activeBadge").className = "badge" + (items.length ? " warn" : " dim");
    $("activeBadge").textContent = `${items.length} running`;
    renderStageList($("activeItems"), items);
  };
  await tick();
  if(activePoll) clearInterval(activePoll);
  activePoll = setInterval(tick, 3000);
}

async function probeMergeAnalyze(){
  try {
    const r = await fetch("/api/sources/merge-analyze", {method:"OPTIONS"});
    mergeReady = r.status !== 404;
  } catch {
    mergeReady = false;
  }
  updateSelCount();
}

loadExtractorOptions();
loadSources();
pollActive();
probeMergeAnalyze();
</script>
</body>
</html>
